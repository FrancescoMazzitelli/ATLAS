services:
  routing-updater:
    build:
      context: ./routing-updater-quarkus
      dockerfile: Dockerfile
    container_name: routing-updater
    ports:
      - "7500:8080"
    environment:
      - TARGET_CONTAINER_NAME=valhalla
      - TRAFFIC_TAR_PATH=/custom_files/traffic.tar
      - VALHALLA_IP=valhalla
      - VALHALLA_PORT=8002
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      valhalla:
        condition: service_healthy

  valhalla:
    image: ghcr.io/valhalla/valhalla-scripted:3.6.3
    container_name: valhalla
    ports:
      - "8002:8002"
    volumes:
      - ./custom_files:/custom_files
    environment:
      - tile_urls=https://download.geofabrik.de/europe/italy/sud-latest.osm.pbf
      - build_elevation=True
      - build_admins=False
      - build_time_zones=False
      - server_threads=4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/status"]
      interval: 30s
      timeout: 60s
      retries: 150