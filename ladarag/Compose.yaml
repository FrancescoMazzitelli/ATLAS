services:
  registry:
    image: hashicorp/consul:latest
    restart: always
    container_name: registry
    command: agent -dev -client=0.0.0.0
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8500/v1/status/leader"]
      interval: 10s
      timeout: 5s
      retries: 5

  mock-server:
    image: quay.io/microcks/microcks-uber@sha256:f11b90eae1e9a8f15142e0aba3f87d609cb75050a56c0eaec995cecb76302d3d
    container_name: mock-server
    ports:
      - "8585:8080"
    volumes:
      - mock-volume:/data
    environment:
      - MICROCKS_CONSUL_URL=http://registry:8500
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 30
    depends_on:
      registry:
        condition: service_healthy

  mock-deployer:
    image: quay.io/microcks/microcks-cli@sha256:7c0ea4c73f68e17614512499d5d707b52fa6d2539375778efa760c10cf25aa2e
    container_name: mock-deployer
    depends_on:
      mock-server:
        condition: service_healthy
      catalog-gateway:
        condition: service_healthy
    volumes:
      - ./MOCKS-smart-city/apis:/apis
      - ./MOCKS-smart-city/scripts:/scripts
      - ./deploy.sh:/deploy.sh:ro
      - ./register.sh:/register.sh:ro
    entrypoint: sh
    command:
      - -c
      - |
        set -e
        echo "Downloading jq..."
        curl -L -o /tmp/jq https://github.com/stedolan/jq/releases/latest/download/jq-linux64
        chmod +x /tmp/jq
        /tmp/jq --version
        echo "jq installed successfully"
        /deploy.sh
        echo "Waiting 15 seconds before running register.sh..."
        sleep 15
        /register.sh
    environment:
      - MICROCKS_HOST=mock-server
      - MICROCKS_PORT=8080
      - MICROCKS_USER=admin
      - MICROCKS_PASS=admin

  catalog-data:
    image: mongo:8.0.6
    container_name: catalog-data
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin
    restart: unless-stopped

  catalog-vector:
    image: qdrant/qdrant:dev
    container_name: catalog-vector
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/data/vector
    restart: unless-stopped

  catalog-gui:
    image: mongo-express:1.0.2-20-alpine3.19
    container_name: catalog-gui
    ports:
      - "27018:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://admin:admin@catalog-data:27017/
      - ME_CONFIG_BASICAUTH_ENABLED=true
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin
    depends_on:
      - catalog-data
    restart: unless-stopped

  catalog-gateway:
    build:
      context: ./db-gateway
      dockerfile: Dockerfile
    container_name: catalog-gateway
    ports:
      - "5000:5000"
    environment:
      - MONGO_USER=admin
      - MONGO_PASS=admin
      - MONGO_HOST=catalog-data
      - MONGO_PORT=27017
      - MONGO_DB=microcks
      - QDRANT_HOST=catalog-vector
      - QDRANT_PORT=6333
      - QDRANT_COLLECTION=services
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 40
    depends_on:
      - catalog-data
      - catalog-vector

  control-unit:
    build:
      context: ./control-unit
      dockerfile: Dockerfile
    container_name: control-unit
    ports:
      - "5500:5500"
    environment:
      - REGISTRY_URL=http://registry:8500
      - CATALOG_URL=http://catalog-gateway:5000
      - OLLAMA_API_URL=http://192.168.250.40:15888
      - MOCK_SERVER_URL=http://mock-server:8080
    depends_on:
      mock-deployer:
        condition: service_completed_successfully
      registry:
        condition: service_healthy

  healthcheck-catalog:
    image: redis/redis-stack:7.2.0-v19
    container_name: healthcheck-catalog
    ports:
      - "6379:6379"
      - "6380:8001"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  healthcheck-service:
    build:
      context: ./redis-connector-quarkus
      dockerfile: Dockerfile
    container_name: healthcheck-service
    ports:
      - "5600:5600"
    environment:
      - REDIS_URL=redis://healthcheck-catalog:6379
    depends_on:
      healthcheck-catalog:
        condition: service_started
      registry:
        condition: service_healthy
      mock-deployer:
        condition: service_completed_successfully
      mock-server:
        condition: service_healthy
      catalog-gateway:
        condition: service_started
      
  routing-updater:
    build:
      context: ./routing-updater-quarkus
      dockerfile: Dockerfile
    container_name: routing-updater
    ports:
      - "7500:8080"
    environment:
      - TARGET_CONTAINER_NAME=valhalla
      - TRAFFIC_TAR_PATH=/custom_files/traffic.tar
      - VALHALLA_IP=valhalla
      - VALHALLA_PORT=8002
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      valhalla:
        condition: service_healthy

  valhalla:
    image: ghcr.io/valhalla/valhalla-scripted:3.6.3
    container_name: valhalla
    ports:
      - "8002:8002"
    volumes:
      - ./custom_files:/custom_files
    environment:
      - tile_urls=https://download.geofabrik.de/europe/italy/sud-latest.osm.pbf
      - build_elevation=True
      - build_admins=False
      - build_time_zones=True
      - server_threads=2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/status"]
      interval: 30s
      timeout: 60s
      retries: 150

volumes:
  mongo-data:
  qdrant-data:
  mock-volume:
  redis-data:
