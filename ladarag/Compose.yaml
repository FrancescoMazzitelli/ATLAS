services:
  registry:
    image: hashicorp/consul:latest
    restart: always
    container_name: registry
    command: agent -dev -client=0.0.0.0
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8500/v1/status/leader"]
      interval: 10s
      timeout: 5s
      retries: 5

  catalog-data:
    image: mongo:8.0.6
    container_name: catalog-data
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin
    restart: unless-stopped

  catalog-data-gui:
    image: mongo-express:1.0.2-20-alpine3.19
    container_name: catalog-data-gui
    ports:
      - "27018:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://admin:admin@catalog-data:27017/
      - ME_CONFIG_BASICAUTH_ENABLED=true
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin
    depends_on:
      - catalog-data
    restart: unless-stopped

  catalog-vector:
    image: qdrant/qdrant:dev
    container_name: catalog-vector
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/data/vector
    restart: unless-stopped

  catalog-gateway:
    build:
      context: ./db-gateway
      dockerfile: Dockerfile
    container_name: catalog-gateway
    ports:
      - "5000:5000"
    environment:
      - MONGO_USER=admin
      - MONGO_PASS=admin
      - MONGO_HOST=catalog-data
      - MONGO_PORT=27017
      - MONGO_DB=microcks
      - QDRANT_HOST=catalog-vector
      - QDRANT_PORT=6333
      - QDRANT_COLLECTION=services
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 60s
      retries: 50
      start_period: 180s
    depends_on:
      - catalog-data
      - catalog-vector

  control-unit:
    build:
      context: ./control-unit
      dockerfile: Dockerfile
    container_name: control-unit
    ports:
      - "5500:5500"
    environment:
      - REGISTRY_URL=http://registry:8500
      - CATALOG_URL=http://catalog-gateway:5000
      - OLLAMA_API_URL=http://192.168.250.40:15888
    depends_on:
      registry:
        condition: service_healthy
      
  routing-updater:
    build:
      context: ./routing-updater-quarkus
      dockerfile: Dockerfile
    container_name: routing-updater
    ports:
      - "5700:8080"
    environment:
      - TARGET_CONTAINER_NAME=valhalla
      - TRAFFIC_TAR_PATH=/custom_files/traffic.tar
      - VALHALLA_HOST=valhalla
      - VALHALLA_PORT=8002
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      valhalla:
        condition: service_healthy

  valhalla:
    image: ghcr.io/valhalla/valhalla-scripted:3.6.3
    container_name: valhalla
    ports:
      - "8002:8002"
    volumes:
      - ./custom_files:/custom_files
    environment:
      - tile_urls=https://download.geofabrik.de/europe/italy/sud-latest.osm.pbf
      - build_elevation=True
      - build_admins=False
      - build_time_zones=False
      - server_threads=4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/status"]
      interval: 30s
      timeout: 60s
      retries: 150

  locations-db:
    image: postgis/postgis:18-3.6
    container_name: locations-db
    ports:
      - "5800:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=admin
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./pg-config/init-dbs.sh:/docker-entrypoint-initdb.d/init-dbs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 5s

  locations-gui:
    image: dpage/pgadmin4:9.13
    container_name: locations-gui
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5801:80"
    depends_on:
      locations-db:
        condition: service_healthy
    volumes:
      - ./pg-config/servers.json:/pgadmin4/servers.json:ro
      - ./pg-config/pgpass:/pgadmin4/pgpass:ro

  roadblock-service:
    build:
      context: ./roadblock-service-quarkus
      dockerfile: Dockerfile
    container_name: roadblock-service
    environment:
      - SELF_HOST=roadblock-service
      - SELF_PORT=8080
      - VALHALLA_HOST=valhalla
      - VALHALLA_PORT=8002
      - CONSUL_HOST=registry
      - CONSUL_PORT=8500
      - GATEWAY_HOST=catalog-gateway
      - GATEWAY_PORT=5000
      - POSTGIS_JDBC=jdbc:postgresql://locations-db:5432/roadblock
      - POSTGIS_USER=admin
      - POSTGIS_PASSWORD=admin
    ports:
      - "5701:8080"
    depends_on:
      valhalla:
        condition: service_healthy
      locations-db:
        condition: service_healthy
      catalog-gateway:
        condition: service_healthy

volumes:
  mongo-data:
  qdrant-data:
  postgres-data: